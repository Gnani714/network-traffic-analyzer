<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor - Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 50px 40px;
            width: 420px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        .logo { font-size: 48px; margin-bottom: 10px; }
        h1 { color: #fff; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #aaa; font-size: 13px; margin-bottom: 30px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        label { color: #ccc; font-size: 13px; display: block; margin-bottom: 7px; }
        input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; color: #fff; font-size: 14px;
            outline: none; transition: border-color 0.3s;
        }
        input:focus { border-color: #6c63ff; }
        input::placeholder { color: #666; }
        .btn {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #6c63ff, #4facfe);
            border: none; border-radius: 10px; color: #fff;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: opacity 0.3s, transform 0.2s; margin-top: 6px;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .error {
            background: rgba(255,80,80,0.15);
            border: 1px solid rgba(255,80,80,0.3);
            color: #ff6b6b; padding: 12px; border-radius: 8px;
            font-size: 13px; margin-bottom: 18px;
        }
        .success {
            background: rgba(63,185,80,0.15);
            border: 1px solid rgba(63,185,80,0.3);
            color: #3fb950; padding: 12px; border-radius: 8px;
            font-size: 13px; margin-bottom: 18px;
        }
        .footer { margin-top: 22px; font-size: 13px; color: #888; }
        .footer a { color: #6c63ff; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: #333; overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🛡️</div>
    <h1>Create Account</h1>
    <p class="subtitle">Network Monitor — AI Traffic System</p>

    {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
    {% if success %}<div class="success">✅ {{ success }} <a href="/login">Login here →</a></div>{% endif %}

    {% if not success %}
    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Choose a username" required minlength="3">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" id="pw" placeholder="Minimum 6 characters" required oninput="checkStrength(this.value)">
            <div class="strength-bar"><div class="strength-fill" id="sfill"></div></div>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm" placeholder="Re-enter password" required>
        </div>
        <button type="submit" class="btn">🚀 Create Account</button>
    </form>
    {% endif %}

    <div class="footer">Already have an account? <a href="/login">Sign in</a></div>
</div>
<script>
function checkStrength(val) {
    const fill = document.getElementById('sfill');
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const pct = (score / 5) * 100;
    const colors = ['#f85149','#d29922','#d29922','#3fb950','#3fb950'];
    fill.style.width = pct + '%';
    fill.style.background = colors[score - 1] || '#333';
}
</script>
</body>
</html>
