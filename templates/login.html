<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 50px 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        .logo { font-size: 48px; margin-bottom: 10px; }
        h1 { color: #fff; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #aaa; font-size: 13px; margin-bottom: 35px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { color: #ccc; font-size: 13px; display: block; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #6c63ff; }
        input::placeholder { color: #666; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c63ff, #4facfe);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            margin-top: 10px;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .error {
            background: rgba(255,80,80,0.15);
            border: 1px solid rgba(255,80,80,0.3);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .hint {
            margin-top: 16px;
            padding: 12px;
            background: rgba(108,99,255,0.1);
            border-radius: 8px;
            color: #aaa;
            font-size: 12px;
        }
        .hint strong { color: #6c63ff; }
        .signup-link {
            margin-top: 16px; font-size: 13px; color: #888;
        }
        .signup-link a { color: #6c63ff; text-decoration: none; }
        .signup-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🛡️</div>
        <h1>Network Monitor</h1>
        <p class="subtitle">AI-Based Traffic Monitoring System</p>

        {% if error %}
        <div class="error">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn">🔐 Sign In</button>
        </form>

        <div class="hint">
            Demo: <strong>admin</strong> / <strong>admin123</strong>
        </div>
        <div class="signup-link">
            Don't have an account? <a href="/signup">Sign up here →</a>
        </div>
    </div>
</body>
</html>
